model: Intel/Qwen3.5-122B-A10B-int4-AutoRound
runtime: vllm
max_nodes: 1
container: scitrera/dgx-spark-vllm:0.16.0-t5
metadata:
  description: Qwen3.5 122B int4 AutoRound quantized model
  maintainer: sparkrun-recipes
  model_params: 122B
  model_dtype: int4
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.70
  max_model_len: 65536
  served_model_name: qwen
env: {}
command: |
  vllm serve \
  {model} \
  --served-model-name {served_model_name} \
  --gpu-memory-utilization {gpu_memory_utilization} \
  --host {host} \
  --port {port} \
  --attention-backend flashinfer \
  --enable-prefix-caching \
  --max-model-len {max_model_len} \
  -tp {tensor_parallel} \
  --distributed-executor-backend ray \
  --reasoning-parser qwen3
