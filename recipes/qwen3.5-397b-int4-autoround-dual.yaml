# Recipe: Qwen3.5-397B-A17B-INT4-Autoround (Dual Spark)
# Qwen3.5-397B model in Intel INT4-Autoround quantization, TP=2 across 2 DGX Spark nodes
# Benchmarked for dual-spark deployment (2× GPUs)
# Requires NVIDIA driver 580.x (590.x has CUDAGraph deadlock bug on GB10)
recipe_version: "1"
name: Qwen3.5-397B-INT4-Autoround-Dual
description: Qwen3.5-397B with TP=2 across 2 DGX Spark nodes (Marlin fix, dual-spark optimized)

# HuggingFace model to download (optional, for --download-model)
model: Intel/Qwen3.5-397B-A17B-int4-AutoRound

# Container image to use
container: vllm-node-nightly-tf5-20260314
build_args:
  - --tf5

# Mods required: coder-next tool/reasoning parser + Marlin TP fix + chat template + GPU mem util GB
mods:
  - mods/fix-qwen3-coder-next
  - mods/fix-qwen3.5-autoround
  - mods/fix-qwen3.5-chat-template
  - mods/gpu-mem-util-gb

# Environment variables
env:
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True

# Default settings (can be overridden via CLI, e.g. --tensor_parallel 2)
defaults:
  port: 40000
  host: 0.0.0.0
  tensor_parallel: 2
  max_model_len: 65536
  max_num_batched_tokens: 4176
  max_num_seqs: 2
  gpu_memory_utilization_gb: 110

# The vLLM serve command template
command: |
  vllm serve \
    Intel/Qwen3.5-397B-A17B-int4-AutoRound \
    --served-model-name Intel/Qwen3.5-397B-A17B-int4-AutoRound \
    --tensor-parallel-size {tensor_parallel} \
    --distributed-executor-backend ray \
    --port {port} \
    --host {host} \
    --gpu-memory-utilization-gb {gpu_memory_utilization_gb} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --enable-chunked-prefill \
    --enable-prefix-caching \
    --kv-cache-dtype fp8 \
    --trust-remote-code \
    --enable-auto-tool-choice \
    --reasoning-parser qwen3 \
    --tool-call-parser qwen3_coder \
    --chat-template unsloth.jinja