model: unsloth/GLM-4.7-Flash-GGUF:Q4_K_M
runtime: llama-cpp
min_nodes: 2
container: scitrera/dgx-spark-llama-cpp:b8094-cu131
metadata:
  description: GLM 4.7 Flash (~59.9GB, 2-node cluster)
  maintainer: scitrera.ai
  model_params: 9B
  model_dtype: q4_k_m
defaults:
  port: 8000
  host: 0.0.0.0
  n_gpu_layers: 99
  ctx_size: 262144
  split_mode: layer
  threads: 20
  parallel: 4
  ubatch: 2048
  flash_attn: 1
  jinja: true
  reasoning_format: auto
  reasoning_budget: -1
command: |
  llama-server \
    -hf {model} \
    --host {host} \
    --port {port} \
    --n-gpu-layers {n_gpu_layers} \
    --ctx-size {ctx_size} \
    --split-mode {split_mode} \
    -t {threads} \
    -np {parallel} \
    --cont-batching \
    -ub {ubatch} \
    -fa {flash_attn} \
    --jinja \
    --reasoning-format {reasoning_format} \
    --no-webui \
    --no-mmap \
    --reasoning-budget {reasoning_budget}