model: nvidia/Qwen3-Next-80B-A3B-Instruct-NVFP4
runtime: vllm
max_nodes: 1
container: avarok/dgx-vllm-nvfp4-kernel:v22
metadata:
  description: Qwen3-Next 80B Instruct NVFP4 with MTP Speculative Decoding
  maintainer: avarok.ai
  model_params: 80B
  model_dtype: nvfp4
  notes: |
    MTP speculative decoding with 2 tokens
    Downloads fix_mtp_nvfp4_exclusion.py from GitHub automatically
defaults:
  port: 8000
  host: 0.0.0.0
  gpu_memory_utilization: 0.90
  max_model_len: 65536
  max_num_seqs: 128
  attention_backend: flashinfer
  speculative_config: '{"method":"mtp","num_speculative_tokens":2}'
env:
  VLLM_USE_FLASHINFER_MOE_FP4: 0
  VLLM_TEST_FORCE_FP8_MARLIN: 1
  VLLM_NVFP4_GEMM_BACKEND: marlin
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  MODEL: {model}
  PORT: {port}
  GPU_MEMORY_UTIL: {gpu_memory_utilization}
  MAX_MODEL_LEN: {max_model_len}
  MAX_NUM_SEQS: {max_num_seqs}
  VLLM_EXTRA_ARGS: --attention-backend {attention_backend} --kv-cache-dtype fp8 --speculative-config '{speculative_config}' --no-enable-chunked-prefill
command: |
  curl -fsSL https://raw.githubusercontent.com/Avarok-Cybersecurity/dgx-vllm/main/fix_mtp_nvfp4_exclusion.py -o /tmp/fix_mtp_nvfp4_exclusion.py && \
  python /tmp/fix_mtp_nvfp4_exclusion.py && \
  serve